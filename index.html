<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MD Library AI Assistant</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
<style>
  :root {
    --blue-50: #E6F1FB;
    --blue-100: #B5D4F4;
    --blue-600: #185FA5;
    --blue-800: #0C447C;
    --teal-50: #E1F5EE;
    --teal-600: #0F6E56;
    --gray-50: #F1EFE8;
    --gray-100: #D3D1C7;
    --gray-600: #5F5E5A;
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #282826;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --text: #f0ede8;
      --text2: #a09e98;
      --blue-50: #042C53;
      --blue-100: #0C447C;
      --blue-600: #85B7EB;
      --blue-800: #B5D4F4;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }

  #app {
    display: flex;
    height: 100vh;
    min-height: 520px;
    max-height: 800px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg);
  }

  /* SIDEBAR */
  #sidebar {
    width: 210px;
    flex-shrink: 0;
    border-right: 0.5px solid var(--border);
    background: var(--bg2);
    display: flex;
    flex-direction: column;
  }
  #sidebar-header {
    padding: 14px 14px 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .lib-name { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .lib-sub { font-size: 10px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
  #topic-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .section-label {
    font-size: 10px; font-weight: 600; color: var(--text2);
    padding: 8px 14px 3px; text-transform: uppercase; letter-spacing: 0.6px;
  }
  .topic-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 7px 14px;
    font-size: 12px; color: var(--text2);
    background: none; border: none; cursor: pointer;
    text-align: left; transition: background 0.15s, color 0.15s;
  }
  .topic-btn:hover { background: var(--bg); color: var(--text); }
  .topic-btn.active { background: var(--bg); color: var(--blue-600); font-weight: 600; }
  .topic-btn i { font-size: 15px; flex-shrink: 0; color: var(--blue-600); }
  #sidebar-footer {
    padding: 10px 14px;
    border-top: 0.5px solid var(--border);
    font-size: 10px; color: var(--text2); line-height: 1.5;
  }
  #sidebar-footer a { color: var(--blue-600); text-decoration: none; }
  #sidebar-footer a:hover { text-decoration: underline; }

  /* CHAT */
  #chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #chat-header {
    padding: 11px 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    background: var(--bg);
  }
  .hdr-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--blue-50); display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .hdr-avatar i { font-size: 18px; color: var(--blue-600); }
  .hdr-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .hdr-sub { font-size: 11px; color: var(--text2); }
  .status-pill {
    margin-left: auto; display: flex; align-items: center;
    gap: 5px; font-size: 11px; color: var(--teal-600);
    background: var(--teal-50); padding: 3px 9px;
    border-radius: 20px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal-600); }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-av {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 13px;
  }
  .msg-av.bot { background: var(--blue-50); color: var(--blue-600); }
  .msg-av.usr { background: var(--blue-600); color: #fff; }
  .bubble {
    max-width: 82%; padding: 9px 13px;
    border-radius: var(--radius-lg); font-size: 13px; line-height: 1.65;
  }
  .msg.bot .bubble {
    background: var(--bg2); color: var(--text);
    border: 0.5px solid var(--border); border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--blue-600); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble a { color: var(--blue-600); text-decoration: underline; font-size: 12px; word-break: break-all; }
  .msg.user .bubble a { color: #B5D4F4; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px;
    border: 0.5px solid var(--border2); font-size: 11px;
    color: var(--text2); background: var(--bg);
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .chip:hover { background: var(--blue-50); color: var(--blue-600); border-color: var(--blue-100); }
  .chip i { font-size: 13px; }

  /* Typing */
  .typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text2); animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Input */
  #input-area {
    padding: 11px 14px; border-top: 0.5px solid var(--border);
    display: flex; gap: 8px; align-items: center; background: var(--bg);
  }
  #user-input {
    flex: 1; padding: 9px 14px; font-size: 13px;
    border: 0.5px solid var(--border2); border-radius: 22px;
    background: var(--bg2); color: var(--text);
    outline: none; font-family: inherit; transition: border 0.15s;
  }
  #user-input:focus { border-color: var(--blue-600); background: var(--bg); }
  #user-input::placeholder { color: var(--text2); }
  #send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--blue-600); border: none; color: #fff;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: background 0.15s;
  }
  #send-btn:hover { background: var(--blue-800); }
  #send-btn i { font-size: 16px; }

  /* Responsive: collapse sidebar on small screens */
  @media (max-width: 540px) {
    #sidebar { display: none; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="lib-name">MD Library</div>
      <div class="lib-sub">Mahamahopadhyay Dhireswaracharya Library<br>KBVSASUN, Nalbari</div>
    </div>
    <div id="topic-list">
      <div class="section-label">Quick topics</div>
      <button class="topic-btn" onclick="quickAsk(this,'What resources and services are available in this library?')">
        <i class="ti ti-building-library"></i> All resources
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'Show me all video lectures available by subject')">
        <i class="ti ti-video"></i> Video lectures
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'What e-journals and e-resources are available?')">
        <i class="ti ti-files"></i> E-resources & journals
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'Show me all study materials available')">
        <i class="ti ti-book"></i> Study materials
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'How do I access the institutional repository?')">
        <i class="ti ti-database"></i> Repository
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'Show question papers and syllabus resources')">
        <i class="ti ti-file-text"></i> Question papers
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'What career guidance resources are available?')">
        <i class="ti ti-briefcase"></i> Career guidance
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'Tell me about ONOS One Nation One Subscription access')">
        <i class="ti ti-globe"></i> ONOS access
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'What MOOC courses are listed?')">
        <i class="ti ti-school"></i> MOOCs
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'Tell me about the manuscript section catalogue')">
        <i class="ti ti-scroll"></i> Manuscripts
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'Tell me about PhD theses awarded from the university')">
        <i class="ti ti-certificate"></i> PhD thesis
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'How do I apply for library membership?')">
        <i class="ti ti-user-plus"></i> Membership
      </button>
      <button class="topic-btn" onclick="quickAsk(this,'What are the library rules and how to contact the library?')">
        <i class="ti ti-info-circle"></i> Library info
      </button>
    </div>
    <div id="sidebar-footer">
      <a href="https://sites.google.com/view/mdlibrary" target="_blank">
        <i class="ti ti-external-link" style="font-size:11px"></i> Open library website
      </a>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="chat-header">
      <div class="hdr-avatar"><i class="ti ti-robot"></i></div>
      <div>
        <div class="hdr-title">Library Assistant</div>
        <div class="hdr-sub">MD Library · KBVSASUN</div>
      </div>
      <div class="status-pill"><div class="status-dot"></div> Online</div>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <input id="user-input" type="text" placeholder="Ask about resources, lectures, journals…" autocomplete="off" />
      <button id="send-btn" aria-label="Send message"><i class="ti ti-send"></i></button>
    </div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are an AI library assistant for the Mahamahopadhyay Dhireswaracharya Library (MD Library) at Kumar Bhaskar Varma Sanskrit and Ancient Studies University (KBVSASUN), Nalbari, Assam, India. The library website is https://sites.google.com/view/mdlibrary

You help students and researchers find and access all library resources. Always be helpful, concise, and include direct links.

COMPLETE LIBRARY RESOURCE MAP:

HOME & ABOUT
- Library collection and users: https://sites.google.com/view/mdlibrary/home/library-collection-and-users
- About Kumar Bhaskar Varma: https://sites.google.com/view/mdlibrary/home/about-kumar-bhaskar-varma
- About Mahamahopadhyay Dhireswaracharya: https://sites.google.com/view/mdlibrary/home/about-mahamahopadhyay-dhireswarachary

VIDEO LECTURES
- MA Political Science 1st Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-political-science/1st-semester
- MA Political Science 2nd Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-political-science/2nd-semester
- MA Political Science 4th Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-political-science/4th-semester
- MA Education 1st Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-education/ma-1st-sem
- MA Education 2nd Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-education/ma-2nd-sem
- MA Education 4th Semester: https://sites.google.com/view/mdlibrary/video-lectures/ma-education/ma-4th-sem
- Sanskrit Sahitya Lectures: https://sites.google.com/view/mdlibrary/video-lectures/sanaskrit-sahitya

INSTITUTIONAL REPOSITORY
- Digital Library: http://kbvsasun.digitallibrary.co.in

STUDY MATERIALS
- LLM Study Materials: https://sites.google.com/view/mdlibrary/study-materials/llm
- Sanskrit Manuscript Resources: https://sites.google.com/view/mdlibrary/study-materials/sanskrit-mansucript-resources
- Sanskrit Sahitya Study Materials: https://sites.google.com/view/mdlibrary/study-materials/sanskrit-sahitya

E-RESOURCES
- Periodicals: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/periodicals
- E-Journals English: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/english
- E-Journals Political Science: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/political-science
- E-Journals Sanskrit Studies: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/sanskrit-studies
- E-Journals Education: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/education
- Newspaper Clipping Service: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/e-journals/newspaper-clipping-service
- E-Newspapers and Magazines: https://sites.google.com/view/mdlibrary/httpnoprniscairresinhandle12345678910290/current-news

MANUSCRIPT SECTION
- Manuscript Catalogue: https://sites.google.com/view/mdlibrary/manuscript-section-catalogue

PHD THESIS
- PhD Theses: https://sites.google.com/view/mdlibrary/phd-thesis-awarded-from-university

ONOS (One Nation One Subscription)
- IDP Login Portal: https://idp.kbvsasun.ac.in/
- ONOS page on library site: https://sites.google.com/view/mdlibrary

CAREER GUIDANCE
- Career News: https://sites.google.com/view/mdlibrary/assignments/career-news
- Career Schemes / Vidya Lakshmi Portal: https://sites.google.com/view/mdlibrary/assignments/vidya-lakshmi-portal
- Career-oriented Resources: https://sites.google.com/view/mdlibrary/assignments/carrer-oriented-resources
- Sanskrit Studies as Career: https://sites.google.com/view/mdlibrary/assignments/sanskrit-studies-as-career
- UGC NET Education: https://sites.google.com/view/mdlibrary/assignments/ugc-net/education

SYLLABUS
- Syllabus: https://sites.google.com/view/mdlibrary/syllabus

QUESTION PAPERS
- PhD Course Work: https://sites.google.com/view/mdlibrary/question-papers/phd-course-work
- PG Question Papers: https://sites.google.com/view/mdlibrary/question-papers/pg-question-paper

WOMEN EMPOWERMENT
- Resources: https://sites.google.com/view/mdlibrary/women-empowerment

MOOCs
- MOOC Courses: https://sites.google.com/view/mdlibrary/moocs

LIBRARIAN'S DESK
- Library 2.0 Initiatives: https://sites.google.com/view/mdlibrary/librarian-s-desk/library-2-0-initiatives
- Library Committee: https://sites.google.com/view/mdlibrary/librarian-s-desk/extra-credit
- Contact Us: https://sites.google.com/view/mdlibrary/librarian-s-desk/contact-us
- Library Rules: https://sites.google.com/view/mdlibrary/librarian-s-desk/contact-me

OTHER SERVICES
- Book Recommendation: https://sites.google.com/view/mdlibrary/book-recomendation
- Membership Form: https://sites.google.com/view/mdlibrary/my-forms

RESPONSE GUIDELINES:
- Always include the relevant direct link(s).
- Be concise — 2 to 5 sentences unless listing multiple resources.
- For subject queries, point to subject-specific sections.
- You may respond in English, Hindi, Assamese or Sanskrit based on the user's language.
- If unsure, direct to the main library site: https://sites.google.com/view/mdlibrary`;

const history = [];
const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');

function escHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatBot(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/(https?:\/\/[^\s<>\)\,\"]+)/g, (u) => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`)
    .replace(/\n/g, '<br>');
}

function addMsg(role, htmlContent) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  const av = document.createElement('div');
  av.className = `msg-av ${role === 'user' ? 'usr' : 'bot'}`;
  av.innerHTML = role === 'user'
    ? '<i class="ti ti-user" aria-hidden="true"></i>'
    : '<i class="ti ti-robot" aria-hidden="true"></i>';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = htmlContent;
  wrap.appendChild(av);
  wrap.appendChild(bub);
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
  return bub;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing';
  wrap.innerHTML = '<div class="msg-av bot"><i class="ti ti-robot" aria-hidden="true"></i></div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  msgsEl.appendChild(wrap);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function hideTyping() { const el = document.getElementById('typing'); if(el) el.remove(); }

async function send(text) {
  if (!text.trim()) return;
  inputEl.value = '';
  addMsg('user', escHTML(text));
  history.push({ role: 'user', content: text });
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await res.json();
    const reply = (data.content || []).map(b => b.text || '').join('');
    history.push({ role: 'assistant', content: reply });
    hideTyping();
    addMsg('bot', formatBot(reply));
  } catch(e) {
    hideTyping();
    addMsg('bot', 'Sorry, something went wrong. Please visit <a href="https://sites.google.com/view/mdlibrary" target="_blank">the library website</a> directly.');
  }
}

function quickAsk(btn, q) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  send(q);
}

document.getElementById('send-btn').onclick = () => send(inputEl.value);
inputEl.addEventListener('keydown', e => { if(e.key === 'Enter') send(inputEl.value); });

// Welcome message
addMsg('bot', `Welcome! I'm your <strong>MD Library Assistant</strong> 📚<br><br>
I can help you instantly access every resource from the
<a href="https://sites.google.com/view/mdlibrary" target="_blank">Mahamahopadhyay Dhireswaracharya Library</a> —
video lectures, e-journals, study materials, question papers, career guidance, ONOS, and more.<br><br>
What are you looking for today?
<div class="chip-row">
  <span class="chip" onclick="send('Show MA Political Science video lectures')"><i class="ti ti-video"></i> MA Pol. Science</span>
  <span class="chip" onclick="send('Show Sanskrit study materials and resources')"><i class="ti ti-book"></i> Sanskrit</span>
  <span class="chip" onclick="send('Show MA Education video lectures and resources')"><i class="ti ti-school"></i> MA Education</span>
  <span class="chip" onclick="send('How do I access ONOS journals?')"><i class="ti ti-globe"></i> ONOS</span>
  <span class="chip" onclick="send('Show PG and PhD question papers')"><i class="ti ti-file-text"></i> Question papers</span>
</div>`);
</script>
</body>
</html>
